# Stellantis-Dictionary — Integração Contínua (lint / testes / build).
#
# Escopo (devops-baseline): valida backend e frontend em cada push/PR.
# Scripts npm referenciados (lint/test/build) são PLACEHOLDERS coerentes — serão
# criados junto do bootstrap de cada pacote. O objetivo aqui é fixar o pipeline.
#
# Sem segredos reais: os testes usam Postgres/pgvector efêmero com valores DUMMY.
# Credenciais reais (deploy) virão de GitHub Secrets/OIDC quando D6 for decidido,
# sempre alinhadas com o Segurança Lead.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancela execuções antigas do mesmo ref quando chega um push novo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------- Backend ---
  backend:
    name: Backend (lint · test · build)
    runs-on: ubuntu-latest

    # Postgres/pgvector como service container para testes de integração.
    # Valores DUMMY apenas para o CI — jamais segredos reais.
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_dummy_password
          POSTGRES_DB: stellantis_dict_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U ci -d stellantis_dict_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://ci:ci_dummy_password@localhost:5432/stellantis_dict_test
      JWT_SECRET: ci_dummy_jwt_secret
      JWT_REFRESH_SECRET: ci_dummy_refresh_secret
      LLM_PROVIDER: claude
      LLM_API_KEY: ci_dummy_llm_key

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # --------------------------------------------------------------- Frontend ---
  frontend:
    name: Frontend (lint · test · build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # --------------------------------------- Validação da imagem Docker (opc.) ---
  docker-build:
    name: Docker build (valida Dockerfile do app)
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build imagem do app (sem push, sem segredos)
        run: docker build -t stellantis-app:ci ./backend
